name: Deploy Cloudflare Worker

# Deploys the wrily-review-dispatcher Worker (integrations/cloudflare-worker/)
# to Cloudflare. Currently runs manually only — to enable auto-deploy on push
# to main once the integration is settled, uncomment the `push` trigger below
# and ensure the `CLOUDFLARE_API_TOKEN` secret is set on this repo.
#
# Token scope needed: "Edit Cloudflare Workers" template on the account that
# owns the Worker. Generate at https://dash.cloudflare.com/profile/api-tokens.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - "integrations/cloudflare-worker/**"
  #     - ".github/workflows/deploy-worker.yml"

jobs:
  deploy:
    name: wrangler deploy
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: integrations/cloudflare-worker
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.33.4

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 20.19.0
          cache: pnpm
          cache-dependency-path: integrations/cloudflare-worker/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - name: Deploy to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: pnpm deploy
