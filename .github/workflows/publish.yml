name: Publish Docker Image

# Builds and pushes the wrily container image on every v* tag.
# Consumers pin to the `:1` (major) tag — see .github/workflows/review.yml.
# We deliberately do not publish `latest`; every published tag should carry
# semver intent.
#
# provenance: false is deliberate: the default (true) emits an OCI Image Index
# digest that the Actions runner's docker daemon cannot pull via `docker pull
# @sha256:…` (returns "manifest unknown"). Plain manifests are pullable.

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee  # v4.2.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9  # v6.1.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}

      - name: Read pinned gantry version
        id: gantry
        run: echo "version=$(tr -d '[:space:]' < .gantry-version)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf  # v7.2.0
        with:
          context: .
          push: true
          build-args: |
            GANTRY_VERSION=${{ steps.gantry.outputs.version }}
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
